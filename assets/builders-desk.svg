<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="screenClip">
      <rect x="411" y="64" width="378" height="170" rx="8"/>
    </clipPath>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="170%">
      <feDropShadow dx="5" dy="6" stdDeviation="0" flood-color="#111111"/>
    </filter>
    <style>
      .steam-one { animation: steamOne 3.2s ease-in-out infinite; }
      .steam-two { animation: steamTwo 3.2s ease-in-out -1.1s infinite; }
      .steam-three { animation: steamThree 3.2s ease-in-out -2.1s infinite; }
      .cursor { animation: blink 1s steps(2, start) infinite; }
      .code { animation: codeScroll 7s ease-in-out infinite; }
      .gear { animation: rotateGear 8s linear infinite; transform-box: fill-box; transform-origin: center; }
      .yellow-note { animation: noteYellow 5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .blue-note { animation: noteBlue 5.5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .robot-route { animation: travel 8s ease-in-out infinite; }
      .commit-route { animation: travel 8s ease-in-out infinite; }
      .robot-body { animation: robotBob .6s ease-in-out infinite alternate; transform-box: fill-box; transform-origin: center; }
      .robot-eyes { animation: eyeBlink 4.2s steps(1, end) infinite; transform-box: fill-box; transform-origin: center; }
      .wheel { animation: wheelSpin 1s linear infinite; transform-box: fill-box; transform-origin: center; }
      .status { animation: statusPulse 3s ease-in-out infinite; }
      .draw-line { stroke-dasharray: 190; animation: drawLine 5s ease-in-out infinite; }

      @keyframes steamOne {
        0% { transform: translate(0, 12px); opacity: 0; }
        25% { opacity: .75; }
        100% { transform: translate(7px, -24px); opacity: 0; }
      }
      @keyframes steamTwo {
        0% { transform: translate(0, 12px); opacity: 0; }
        25% { opacity: .6; }
        100% { transform: translate(-5px, -27px); opacity: 0; }
      }
      @keyframes steamThree {
        0% { transform: translate(0, 12px); opacity: 0; }
        25% { opacity: .55; }
        100% { transform: translate(5px, -22px); opacity: 0; }
      }
      @keyframes blink {
        0%, 46% { opacity: 1; }
        47%, 100% { opacity: 0; }
      }
      @keyframes codeScroll {
        0%, 12% { transform: translateY(0); }
        45%, 58% { transform: translateY(-48px); }
        90%, 100% { transform: translateY(0); }
      }
      @keyframes rotateGear { to { transform: rotate(360deg); } }
      @keyframes noteYellow {
        0%, 100% { transform: translateY(0) rotate(-2deg); }
        50% { transform: translateY(-5px) rotate(1deg); }
      }
      @keyframes noteBlue {
        0%, 100% { transform: translateY(0) rotate(2deg); }
        50% { transform: translateY(5px) rotate(-1deg); }
      }
      @keyframes travel {
        0%, 10% { transform: translateX(0); }
        68%, 100% { transform: translateX(118px); }
      }
      @keyframes robotBob {
        from { transform: translateY(0); }
        to { transform: translateY(-3px); }
      }
      @keyframes eyeBlink {
        0%, 45%, 49%, 100% { transform: scaleY(1); }
        46%, 48% { transform: scaleY(.14); }
      }
      @keyframes wheelSpin { to { transform: rotate(360deg); } }
      @keyframes statusPulse {
        0%, 100% { fill: #B9FBC0; }
        50% { fill: #F9E900; }
      }
      @keyframes drawLine {
        0% { stroke-dashoffset: 190; opacity: 0; }
        25%, 75% { stroke-dashoffset: 0; opacity: 1; }
        100% { stroke-dashoffset: -190; opacity: 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; }
      }
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="360" rx="24" fill="#FFF8E7"/>
  <path d="M0 28C156 52 236 7 382 28C538 50 674 8 830 29C990 51 1080 11 1200 30" stroke="#111111" stroke-opacity=".08" stroke-width="2"/>

  <!-- top label -->
  <g transform="translate(42 24)">
    <circle cx="0" cy="0" r="4" fill="#FF4D00"/>
    <circle cx="18" cy="0" r="4" fill="#146EF5"/>
    <circle cx="36" cy="0" r="4" fill="#F9E900" stroke="#111111"/>
    <text x="58" y="5" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="900" letter-spacing="2" fill="#111111">AHAN'S BUILD DESK</text>
  </g>

  <!-- section dividers -->
  <path d="M320 67V264M881 67V264" stroke="#111111" stroke-opacity=".12" stroke-width="2" stroke-dasharray="7 8"/>
  <text x="165" y="77" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="900" letter-spacing="2" fill="#77716A">THINK + REFUEL</text>
  <text x="600" y="40" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="900" letter-spacing="2" fill="#77716A">DESIGN + CODE</text>
  <text x="1040" y="77" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="900" letter-spacing="2" fill="#77716A">BUILD + TEST</text>

  <!-- left idea card -->
  <g class="yellow-note" filter="url(#shadow)">
    <rect x="65" y="94" width="120" height="92" rx="3" fill="#F9E900" stroke="#111111" stroke-width="3"/>
    <text x="125" y="120" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="900" letter-spacing="1.2" fill="#111111">NEXT IDEA</text>
    <path d="M88 139H162M88 154H150M88 169H158" stroke="#111111" stroke-width="4" stroke-linecap="round"/>
    <path d="M156 94L185 123V94H156Z" fill="#FFB000" stroke="#111111" stroke-width="3" stroke-linejoin="round"/>
  </g>
  <path class="draw-line" d="M70 208C101 190 132 220 160 201C182 186 209 193 226 208" stroke="#FF4D00" stroke-width="5" stroke-linecap="round"/>

  <!-- coffee -->
  <g transform="translate(207 149)" filter="url(#shadow)">
    <path d="M0 46H84V104C84 116 74 126 62 126H22C10 126 0 116 0 104V46Z" fill="#146EF5" stroke="#111111" stroke-width="4"/>
    <path d="M84 61H96C115 61 115 101 90 103H84" stroke="#111111" stroke-width="8"/>
    <ellipse cx="42" cy="46" rx="42" ry="11" fill="#111111"/>
    <ellipse cx="42" cy="44" rx="33" ry="6" fill="#6F4E37"/>
    <text x="42" y="86" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="900" fill="white">DEBUG</text>
    <text x="42" y="103" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="900" fill="#F9E900">JUICE</text>
  </g>
  <g stroke="#111111" stroke-width="4" stroke-linecap="round">
    <path class="steam-one" d="M230 180C219 167 241 159 230 144"/>
    <path class="steam-two" d="M250 180C239 165 263 157 250 138"/>
    <path class="steam-three" d="M271 180C261 168 281 160 272 146"/>
  </g>

  <!-- laptop -->
  <g filter="url(#shadow)">
    <rect x="393" y="46" width="414" height="207" rx="16" fill="#111111"/>
    <rect x="411" y="64" width="378" height="170" rx="8" fill="#172032"/>
    <path d="M355 253H845L814 274H386L355 253Z" fill="#A0C4FF" stroke="#111111" stroke-width="4" stroke-linejoin="round"/>
    <rect x="567" y="258" width="66" height="7" rx="3.5" fill="#111111" opacity=".35"/>
  </g>
  <g clip-path="url(#screenClip)">
    <circle class="status" cx="429" cy="81" r="5" fill="#B9FBC0"/>
    <circle cx="446" cy="81" r="5" fill="#F9E900"/>
    <circle cx="463" cy="81" r="5" fill="#FF4D00"/>
    <g class="code" font-family="Consolas, Courier New, monospace" font-size="13" font-weight="700">
      <text x="431" y="113" fill="#A0C4FF">const</text>
      <text x="476" y="113" fill="#FFF8E7">idea =</text>
      <text x="537" y="113" fill="#F9E900">"slightly impossible"</text>
      <text x="431" y="140" fill="#FF8A65">while</text>
      <text x="472" y="140" fill="#FFF8E7">(coffee &amp;&amp; curiosity) {</text>
      <text x="451" y="167" fill="#B9FBC0">build</text>
      <text x="494" y="167" fill="#FFF8E7">(idea);</text>
      <text x="451" y="194" fill="#B9FBC0">break</text>
      <text x="501" y="194" fill="#FFF8E7">(everything);</text>
      <text x="451" y="221" fill="#B9FBC0">learn</text>
      <text x="494" y="221" fill="#FFF8E7">();</text>
      <text x="431" y="248" fill="#FFF8E7">}</text>
      <text x="431" y="275" fill="#A0C4FF">return</text>
      <text x="486" y="275" fill="#F9E900">shipped;</text>
    </g>
    <rect class="cursor" x="565" y="205" width="9" height="18" fill="#F9E900"/>
  </g>

  <!-- right planning note -->
  <g class="blue-note" filter="url(#shadow)">
    <rect x="908" y="94" width="120" height="92" rx="3" fill="#A0C4FF" stroke="#111111" stroke-width="3"/>
    <text x="968" y="120" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="900" letter-spacing="1.2" fill="#111111">TODAY</text>
    <text x="968" y="144" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="900" fill="#111111">BUILD THE</text>
    <text x="968" y="165" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="900" fill="#FF4D00">WEIRD IDEA</text>
  </g>

  <!-- Arduino board -->
  <g transform="translate(1048 111)" filter="url(#shadow)">
    <rect x="0" y="48" width="112" height="78" rx="10" fill="#B9FBC0" stroke="#111111" stroke-width="4"/>
    <rect x="15" y="68" width="45" height="37" rx="4" fill="#146EF5" stroke="#111111" stroke-width="3"/>
    <circle cx="83" cy="76" r="6" fill="#F9E900" stroke="#111111" stroke-width="3"/>
    <circle cx="99" cy="76" r="6" fill="#FF4D00" stroke="#111111" stroke-width="3"/>
    <path d="M75 101H101M75 112H94" stroke="#111111" stroke-width="4" stroke-linecap="round"/>
    <g class="gear" transform="translate(55 0)">
      <path d="M20 0H34L37 9L46 13L54 7L64 17L58 25L62 34L72 37V51L62 54L58 63L64 71L54 81L46 75L37 79L34 88H20L17 79L8 75L0 81L-10 71L-4 63L-8 54L-18 51V37L-8 34L-4 25L-10 17L0 7L8 13L17 9L20 0Z" fill="#F9E900" stroke="#111111" stroke-width="4" stroke-linejoin="round"/>
      <circle cx="27" cy="44" r="15" fill="#FFF8E7" stroke="#111111" stroke-width="4"/>
    </g>
  </g>

  <!-- desk surface -->
  <rect x="35" y="275" width="1130" height="26" rx="10" fill="#FF4D00" stroke="#111111" stroke-width="4"/>
  <path d="M84 301V344M1116 301V344" stroke="#111111" stroke-width="13" stroke-linecap="round"/>

  <!-- commit block -->
  <g class="commit-route">
    <rect x="861" y="229" width="70" height="44" rx="5" fill="#F9E900" stroke="#111111" stroke-width="4" filter="url(#shadow)"/>
    <text x="896" y="247" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="900" letter-spacing=".8" fill="#111111">COMMIT</text>
    <path d="M877 258H916" stroke="#111111" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- robot -->
  <g class="robot-route">
    <g class="robot-body" filter="url(#shadow)">
      <rect x="773" y="214" width="62" height="48" rx="10" fill="#FFF8E7" stroke="#111111" stroke-width="4"/>
      <rect x="783" y="185" width="42" height="31" rx="9" fill="#A0C4FF" stroke="#111111" stroke-width="4"/>
      <g class="robot-eyes">
        <circle cx="795" cy="200" r="4" fill="#111111"/>
        <circle cx="813" cy="200" r="4" fill="#111111"/>
      </g>
      <path d="M804 185V174M798 174H810" stroke="#111111" stroke-width="4" stroke-linecap="round"/>
      <path d="M785 229H823M794 242H814" stroke="#FF4D00" stroke-width="4" stroke-linecap="round"/>
      <path d="M835 229L851 239L858 236" stroke="#111111" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M773 230L758 240" stroke="#111111" stroke-width="5" stroke-linecap="round"/>
    </g>
    <g class="wheel">
      <circle cx="787" cy="269" r="9" fill="#111111"/>
      <path d="M787 263V275M781 269H793" stroke="#FFF8E7" stroke-width="2"/>
    </g>
    <g class="wheel">
      <circle cx="821" cy="269" r="9" fill="#111111"/>
      <path d="M821 263V275M815 269H827" stroke="#FFF8E7" stroke-width="2"/>
    </g>
  </g>

  <!-- footer labels -->
  <text x="165" y="326" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="900" letter-spacing="1.5" fill="#111111">IDEAS NEED FUEL</text>
  <text x="600" y="326" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="900" letter-spacing="1.5" fill="#111111">TURN THOUGHTS INTO SOFTWARE</text>
  <text x="1040" y="326" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="900" letter-spacing="1.5" fill="#111111">MAKE IT MOVE</text>
</svg>
